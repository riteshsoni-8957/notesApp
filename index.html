<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="form-container" >
        <h2>New Call</h2>
        <form action="">
            <div id="imageURL" class="label-input">
                <label for="url">Image URL :</label>
                <input type="url" placeholder="https://example.com/photoes.jpg" id="url-input" class="txt-input" autocomplete="off" required>
                <small id="imgURLError" class="error" ></small>
            </div>
            <div id="name" class="label-input">
                <label for="name">Full Name :</label>
                <input type="text" placeholder="Enter full name" id="name-input" class="txt-input" autocomplete="off" required>
                <small id="nameError" class="error"></small>
            </div>
            <div id="homeTown" class="label-input">
                <label for="hTown">Home Town :</label>
                <input type="text" placeholder="Enter home town" id="hTown-input" class="txt-input" autocomplete="off" required>
                <small id="hTownError" class="error"></small>
            </div>
            <div id="purpose" class="label-input">
                <label for="purpose">Purpose :</label>
                <input type="text" placeholder="Quick appointment note"  id="purpose-input" class="txt-input" autocomplete="off" required>
                <small id="purposeError" class="error"></small>
            </div>

            <div id="category" class="label-input">
                <h3>Category :</h3>

                <label for="emergency">
                    <input type="radio" name="category" value="Emergency" id="emergency" class="radio-input">
                    Emergency
                </label>

                <label for="important">
                    <input type="radio" name="category" value="Important" id="important" class="radio-input">
                    Important
                </label>

                <label for="urgent">
                    <input type="radio" name="category" value="Urgent" id="urgent" class="radio-input">
                    Urgent
                </label>

                <label for="noRush">
                    <input type="radio" name="category" value="No Rush" id="noRush" class="radio-input">
                    No Rush
                </label>

                <small id="categoryError" class="error"></small>
            </div>

            <button type="submit" id="create-note-btn">Create Note</button>
            <button type="button" id="close-btn">Close</button>
        </form>
    </div>
    
    <div id="notes-container">
        <div id="left-icon">
            <button id="open-form-btn"><ion-icon name="add-outline"></ion-icon></button>
            <button id="upBtn"><ion-icon name="arrow-up-outline"></ion-icon></button>
            <button id="downBtn"><ion-icon name="arrow-down-outline"></ion-icon></button>
        </div>

            <div class="color" id="black" onclick="changeBackground('black')"></div>
